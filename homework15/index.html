<!doctype html>
<html class="page" lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/index.css" />
    <link
      rel="shortcut icon"
      href="./icons/nike-favicon-32x32.ico"
      type="image/x-icon"
    />
    <script defer  src="./js/index.js" type="module"></script>
    <title>Nike Air Mag</title>
  </head>
  <body class="page__body">
    <header class="header header--fixed">
      <div class="container header__container">
        <a class="logo header__logo" href="/">
          <img
            class="logo__img"
            src="./icons/logo-icon.svg"
            width="50"
            height="20"
            alt="Логотип найк"
          />
        </a>
        <nav
          class="menu header__menu header__menu--open"
          id="header__menu"
          aria-label="Главное меню"
        >
          <ul class="menu__list">
            <li class="menu__item">
              <a class="menu__link" href="#air-mag" lang="en">Air Mag</a>
            </li>
            <li class="menu__item">
              <a class="menu__link" href="#sizes">Размеры</a>
            </li>
            <li class="menu__item">
              <a class="menu__link" href="#characteristics">Характеристики</a>
            </li>
            <li class="menu__item">
              <a class="menu__link" href="#top-models">Другие ТОП модели</a>
            </li>
          </ul>
        </nav>
        <div class="header__controls">
          <a class="header__order" href="#">Сделать заказ</a>
          <div class="header__buttons">
            <button class="header__button" aria-label="Поиск" title="Поиск">
              <svg width="24" height="24">
                <use
                  class="header__button-icon"
                  href="./icons/sprite.svg#search"
                ></use>
              </svg>
            </button>
            <button class="header__button" aria-label="Корзина" title="Корзина">
              <svg width="24" height="24">
                <use
                  class="header__button-icon"
                  href="./icons/sprite.svg#cart"
                ></use>
              </svg>
            </button>
            <button
              class="header__burger burger"
              aria-label="Открыть меню"
              aria-expanded="false"
              aria-controls="header__menu"
            >
              <svg width="24" height="24">
                <use
                  class="burger__icon-menu"
                  href="./icons/sprite.svg#menu-burger"
                ></use>
                <use
                  class="burger__icon-cross"
                  href="./icons/sprite.svg#menu-cross"
                ></use>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
