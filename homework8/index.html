<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
      <form class="form">
        <div class="content">
          <h2 class="title-content">WELCOME</h2>
          <p class="content-text"> Lorem ipsum dolor sit amet consectetur adipisicing.</p>
        </div>
        <fieldset class="fieldset">
          <h2 class="form-title">Sing up</h2>
  
          <div class="user-info">
            <div class="name-info">
              <label for="name" class="label"></label>
              <input 
               type="text"
               id="name" 
               class="input name" 
               placeholder="Name"
               name="name"
               required
               />
              <label for="surname" class="label"></label>
              <input 
               type="text"
               id="surname" 
               class="input surname" 
               placeholder="Surname"
               name="surname"
               required
               />
            </div>
            <label for="tel" class="label"></label>
            <input 
             type="tel"
             id="tel" 
             class="input tel" 
             placeholder="Phone number"
             name="tel"
             required
             />
            <label for="email" class="label"></label>
            <input 
             type="email"
             id="email" 
             class="input email" 
             placeholder="Email"
             name="email"
             required
             />
            <label for="password" class="label"></label>
            <input 
             type="password"
             id="password" 
             class="input password" 
             placeholder="Password"
             name="password"
             required
             />
            <label for="password" class="label"></label>
            <input 
             type="password"
             id="password" 
             class="input password" 
             placeholder="Password"
             name="password"
             required
             />
          </div>
  
          <label for="message" class="label"></label>
          <textarea 
            id="message"
            class="textarea"
            placeholder="New message"
            name="message"
            required
          ></textarea>
            <div class="checkbox-btn">
              <label for="message" class="label checkbox-label"> 
                <input type="checkbox" class="checkbox"name="checkbox" required>
                <span class="checkbox-text">I agree</span>
              </label>
              <button class="button">Sing up</button>
            </div>
        </fieldset>
      </form>
  </body>
</html>
